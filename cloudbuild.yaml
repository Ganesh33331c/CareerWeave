# =============================================================================
# cloudbuild.yaml — Google Cloud Build CI/CD Pipeline
#
# Trigger this manually OR connect it to your GitHub repo in Cloud Build
# so every push to `main` auto-deploys to Cloud Run.
#
# Pipeline stages:
#   1. Build Docker image
#   2. Push image to Artifact Registry
#   3. Deploy to Cloud Run
#
# Prerequisites (run these once in Cloud Shell before first build):
#   gcloud services enable \
#       cloudbuild.googleapis.com \
#       run.googleapis.com \
#       artifactregistry.googleapis.com \
#       secretmanager.googleapis.com
#
# Substitution variables (set in Cloud Build trigger UI or --substitutions flag):
#   _REGION          : GCP region, e.g. asia-south1
#   _SERVICE_NAME    : Cloud Run service name, e.g. careerweave
#   _REPO_NAME       : Artifact Registry repo name, e.g. careerweave-repo
#
# Usage (manual trigger from Cloud Shell):
#   gcloud builds submit \
#     --config cloudbuild.yaml \
#     --substitutions _REGION=asia-south1,_SERVICE_NAME=careerweave,_REPO_NAME=careerweave-repo .
# =============================================================================

substitutions:
  _REGION: asia-south1          # Mumbai — lowest latency for India
  _SERVICE_NAME: careerweave
  _REPO_NAME: careerweave-repo

steps:
  # ── Step 1: Build the Docker image ─────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '--tag'
      # Full Artifact Registry path: REGION-docker.pkg.dev/PROJECT/REPO/IMAGE:TAG
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$SHORT_SHA'
      - '--tag'
      # Also tag as :latest for easy reference
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:latest'
      - '--cache-from'
      # Pull :latest to use as layer cache → faster subsequent builds
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:latest'
      - '.'
    waitFor: ['-']   # start immediately

  # ── Step 2: Push image to Artifact Registry ─────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}'
    waitFor: ['build-image']

  # ── Step 3: Deploy to Cloud Run ─────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloudrun'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$SHORT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'      # public URL — required for hackathon demo
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'                        # comfortable for Streamlit + Gemini SDK
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'                            # scale-to-zero to save costs
      - '--max-instances'
      - '3'
      - '--timeout'
      - '300'                          # 5 min — enough for LLM round-trips
      - '--set-env-vars'
      - 'PYTHONUNBUFFERED=1'
    waitFor: ['push-image']

# ── Images to push (Cloud Build also tracks these) ───────────────────────────
images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:latest'

# ── Build options ────────────────────────────────────────────────────────────
options:
  logging: CLOUD_LOGGING_ONLY    # logs go to Cloud Logging, not GCS
  machineType: 'E2_MEDIUM'       # faster builds than the default N1
  substitutionOption: 'ALLOW_LOOSE'

timeout: '1200s'   # 20-minute overall build timeout
